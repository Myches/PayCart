name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Upload to S3
        run: |
          # Static assets (JS/CSS/images) — long-lived cache, content-hashed filenames
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --region ${{ env.AWS_REGION }} \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # HTML files — never cache so new deploys are instant
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "*"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          echo "Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID
          echo "✅ Cache invalidated"

      - name: Verify deployment
        run: |
          echo "Testing live site..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.CLOUDFRONT_DOMAIN }})
          echo "HTTP Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Site is live" || (echo "❌ Site check failed with status $STATUS" && exit 1)

      - name: Notify success
        if: success()
        run: echo "✅ Frontend deployed — https://${{ secrets.CLOUDFRONT_DOMAIN }}"
