name: Deploy Backend to Lambda

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # allow manual trigger

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: paycart-api
  NODE_VERSION: '20'

jobs:
  test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build TypeScript
        run: npm run build

      - name: Create deployment package
        run: |
          zip -r function.zip dist/ package.json -x "node_modules/*"
          mkdir -p node_modules_prod
          npm ci --omit=dev --prefix . --save-prefix="" 2>/dev/null || true
          zip -r function.zip node_modules_prod/
       

      - name: Check zip size
        run: |
          SIZE=$(du -sm function.zip | cut -f1)
          echo "Package size: ${SIZE}MB"
          if [ $SIZE -gt 50 ]; then
            echo "⚠️ Package is over 50MB — uploading via S3"
            echo "USE_S3=true" >> $GITHUB_ENV
          else
            echo "USE_S3=false" >> $GITHUB_ENV
          fi

      - name: Upload via S3 (if over 50MB)
        if: env.USE_S3 == 'true'
        run: |
          aws s3 cp function.zip s3://${{ secrets.S3_BUCKET }}/lambda/function.zip
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key lambda/function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Upload directly (under 50MB)
        if: env.USE_S3 == 'false'
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --zip-file fileb://function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify deployment
        run: |
          echo "Testing health endpoint..."
          RESPONSE=$(curl -s https://${{ secrets.API_GATEWAY_ID }}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' && echo "✅ Health check passed" || (echo "❌ Health check failed" && exit 1)

      - name: Notify success
        if: success()
        run: echo "✅ Backend deployed successfully to Lambda"

      - name: Notify failure
        if: failure()
        run: echo "❌ Backend deployment failed — check logs above"
