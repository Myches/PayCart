name: Deploy Backend to Lambda

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: paycart-api
  NODE_VERSION: '20'

jobs:
  test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        # Install all deps (including devDeps) so esbuild can bundle everything
        run: npm ci

      - name: Build & Bundle with esbuild
        run: |
          npx esbuild src/index.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --outfile=dist/index.js \
            --minify \
            --external:@aws-sdk/*
          # ↑ @aws-sdk/* is pre-installed in the Lambda Node 20 runtime — no need to ship it.
          # Add any other native/optional externals here, e.g.: --external:sharp

      - name: Create deployment package
        run: zip function.zip dist/index.js

      - name: Check zip size
        run: |
          # Compressed size (Lambda direct-upload limit: 50 MB)
          ZIPPED_MB=$(du -sm function.zip | cut -f1)
          echo "Zipped size:   ${ZIPPED_MB} MB"

          # Unzipped size (Lambda hard limit: 250 MB)
          UNZIPPED_BYTES=$(unzip -l function.zip | tail -1 | awk '{print $1}')
          UNZIPPED_MB=$(( UNZIPPED_BYTES / 1024 / 1024 ))
          echo "Unzipped size: ${UNZIPPED_MB} MB"

          if [ "$UNZIPPED_MB" -gt 250 ]; then
            echo "❌ Unzipped size ${UNZIPPED_MB} MB exceeds Lambda's 250 MB hard limit."
            echo "Add more --external flags to esbuild or split the function."
            exit 1
          fi

          if [ "$ZIPPED_MB" -gt 50 ]; then
            echo "⚠️  Zipped package is over 50 MB — will upload via S3"
            echo "USE_S3=true" >> $GITHUB_ENV
          else
            echo "USE_S3=false" >> $GITHUB_ENV
          fi

      - name: Upload via S3 (over 50 MB)
        if: env.USE_S3 == 'true'
        run: |
          aws s3 cp function.zip s3://${{ secrets.S3_BUCKET }}/lambda/function.zip
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key lambda/function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Upload directly (under 50 MB)
        if: env.USE_S3 == 'false'
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --zip-file fileb://function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify deployment
        run: |
          echo "Testing health endpoint..."
          RESPONSE=$(curl -s https://${{ secrets.API_GATEWAY_ID }}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' && echo "✅ Health check passed" || (echo "❌ Health check failed" && exit 1)

      - name: Notify success
        if: success()
        run: echo "✅ Backend deployed successfully to Lambda"

      - name: Notify failure
        if: failure()
        run: echo "❌ Backend deployment failed — check logs above"
